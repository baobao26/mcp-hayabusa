title: LSASS Memory Dump via comsvcs.dll MiniDump
id: 1a6d094c-8354-43ad-b9e0-085946de302c
status: test
description: |
    Detects usage of rundll32.exe to call the exported MiniDump function from
    comsvcs.dll against the LSASS process ID, a well-known living-off-the-land
    technique for dumping credentials without dropping additional tooling.
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_lsass_dump_comsvcs_dll.yml
author: Detection Engineering KB
date: 2026-07-12
tags:
    - attack.credential-access
    - attack.t1003.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\rundll32.exe'
    selection_cmd:
        CommandLine|contains: 'comsvcs.dll'
    selection_export:
        CommandLine|contains:
            - 'MiniDump'
            - '#24'
    condition: all of selection_*
falsepositives:
    - Legitimate use of MiniDump for non-LSASS process troubleshooting (verify target PID)
level: critical
