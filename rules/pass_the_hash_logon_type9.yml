title: Potential Pass-the-Hash Activity via Explicit Credential Logon
id: 3d17315d-9ccd-402b-b852-e71fdfcdb4db
status: test
description: |
    Detects a Logon Type 9 (NewCredentials) event (Event ID 4624) combined
    with NTLM as the authentication package, typically produced by tools like
    Mimikatz's sekurlsa::pth or Impacket's psexec.py when reusing a captured
    NTLM hash to authenticate as another user without knowing the plaintext
    password.
references:
    - https://attack.mitre.org/techniques/T1550/002/
    - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/builtin/security/win_security_susp_logon_explicit_credentials.yml
author: Detection Engineering KB
date: 2026-07-12
tags:
    - attack.lateral-movement
    - attack.t1550.002
    - attack.s0002
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4624
        LogonType: 9
        AuthenticationPackageName: 'Negotiate'
    filter_logonprocess:
        LogonProcessName: 'seclogo'
    condition: selection and not filter_logonprocess
falsepositives:
    - RunAs /netonly usage by administrators for legitimate remote administration
    - Credential Manager-backed applications that cache and reuse credentials
level: high
